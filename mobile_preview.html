<\!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <title>Volt Impact Cards – Mobilní náhled</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    }
    .preview-label {
      color: rgba(245,197,24,0.8);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .phone-frame {
      position: relative;
      width: 393px;
      background: #1a1a2e;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 0 6px #0d0d1a,
        0 0 0 8px rgba(255,255,255,0.05),
        0 40px 120px rgba(0,0,0,0.9),
        0 0 80px rgba(245,197,24,0.06);
      overflow: hidden;
    }
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      left: -9px;
      top: 120px;
      width: 4px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px 0 0 4px;
      box-shadow: 0 50px 0 rgba(255,255,255,0.1), 0 96px 0 rgba(255,255,255,0.1);
    }
    .phone-frame::after {
      content: '';
      position: absolute;
      right: -9px;
      top: 160px;
      width: 4px;
      height: 68px;
      background: rgba(255,255,255,0.1);
      border-radius: 0 4px 4px 0;
    }
    .phone-screen {
      width: 100%;
      height: 852px;
      border: none;
      display: block;
      border-radius: 48px;
      overflow: hidden;
    }
    .phone-notch-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 58px;
      background: rgba(8,8,16,0.95);
      border-radius: 48px 48px 0 0;
      pointer-events: none;
      z-index: 5;
      display: flex;
      align-items: center;
      padding: 0 28px;
    }
    .status-time {
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      margin-right: auto;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      color: #fff;
      font-size: 0.7rem;
    }
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      z-index: 10;
    }
    .controls {
      margin-top: 32px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,197,24,0.1);
      border: 1px solid rgba(245,197,24,0.3);
      color: #f5c518;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 30px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .controls a:hover { background: rgba(245,197,24,0.2); }
    .controls a.secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
    }
    .controls a.secondary:hover { background: rgba(255,255,255,0.1); }
    .size-note {
      margin-top: 16px;
      color: rgba(255,255,255,0.25);
      font-size: 0.72rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="preview-label">📱 Mobilní náhled – Volt Impact Cards</div>

  <div class="phone-frame">
    <div class="dynamic-island"></div>
    <div class="phone-notch-overlay">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" fill="white" viewBox="0 0 16 12">
          <rect x="0" y="4" width="3" height="8" rx="1" opacity=".4"/>
          <rect x="4" y="2.5" width="3" height="9.5" rx="1" opacity=".6"/>
          <rect x="8" y="1" width="3" height="11" rx="1" opacity=".8"/>
          <rect x="12" y="0" width="3" height="12" rx="1"/>
        </svg>
        <svg width="15" height="12" fill="white" viewBox="0 0 15 12">
          <path d="M7.5 2C9.8 2 11.9 3 13.4 4.6L14.9 3C13 1.1 10.4 0 7.5 0S2 1.1.1 3L1.6 4.6C3.1 3 5.2 2 7.5 2z" opacity=".4"/>
          <path d="M7.5 5c1.4 0 2.7.6 3.6 1.5L12.7 5C11.4 3.7 9.5 3 7.5 3S3.6 3.7 2.3 5L4 6.5C4.8 5.6 6.1 5 7.5 5z" opacity=".7"/>
          <path d="M7.5 8a2 2 0 011.4.6L10.5 7A4 4 0 007.5 6a4 4 0 00-3 1L6.1 8.6A2 2 0 017.5 8z"/>
          <circle cx="7.5" cy="11" r="1.5"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12">
          <rect x="0" y="1" width="21" height="10" rx="3" fill="none" stroke="white" stroke-width="1.2" opacity=".5"/>
          <rect x="1.5" y="2.5" width="16" height="7" rx="2" fill="white"/>
          <path d="M22.5 4.5v3a1.5 1.5 0 000-3z" fill="white" opacity=".5"/>
        </svg>
      </div>
    </div>
    <iframe
      class="phone-screen"
      src="index.html"
      title="Volt Impact Cards – Mobilní náhled"
      scrolling="yes"
    ></iframe>
    <div class="home-indicator"></div>
  </div>

  <div class="controls">
    <a href="index.html" target="_blank">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Otevřít plný web
    </a>
    <a href="mobile_preview.html" class="secondary">↺ Obnovit</a>
  </div>

  <div class="size-note">iPhone 15 Pro simulace (393 × 852 px)</div>

</body>
</html>
